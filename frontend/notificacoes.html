<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Suporte</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <aside class="sidebar">
        <div>
          <div class="logo-side">
            <h2>HABILITA.SAÚDE</h2>
            <p>Plataforma De Cursos em Saúde</p>
          </div>

          <ul>
            <li>
              <a href="./dashboard.html">
                <i class="fa-solid fa-house"></i>
                Início
              </a>
            </li>

            <li>
              <a href="./meus-cursos.html">
                <i class="fa-solid fa-book"></i>
                Meus Cursos
              </a>
            </li>

            <li>
              <a href="./financas.html">
                <i class="fa-solid fa-chart-pie"></i>
                Finanças
              </a>
            </li>

            <li>
              <a href="./criar-curso.html">
                <i class="fa-solid fa-plus"></i>
                Criar Curso
              </a>
            </li>

            <li>
              <a href="./usuarios.html">
                <i class="fa-solid fa-users"></i>
                Usuários
              </a>
            </li>

            <li>
              <a href="./relatorios.html">
                <i class="fa-solid fa-chart-line"></i>
                Relatórios
              </a>
            </li>
          </ul>
        </div>

        <div class="perfil">
          <div class="foto-wrapper">
            <img id="fotoUsuarioSidebar" src="./img/perfil.jpg" />

            <span class="online"></span>
          </div>

          <span id="nomeUsuarioSidebar"></span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1>PROFESSOR</h1>
            <p>Bem-vindo(a) ao seu painel</p>
          </div>

          <div class="icons">
            <a href="suporte.html">
              <i class="fa-regular fa-circle-question"></i>
            </a>
            <a href="notificacoes.html">
              <i class="fa-regular fa-bell active-icon"></i>
            </a>

            <div class="user-top">
              <div class="foto-wrapper">
                <img id="fotoUsuarioTop" src="./img/perfil.jpg" />

                <span class="online"></span>
              </div>

              <span id="nomeUsuarioTop"></span>
            </div>
          </div>
        </header>

        <section class="suporte-header">
          <h2>Notificações</h2>
          <p>
            Estamos aqui para ajudá-lo. Tire suas dúvidas ou abra um chamado.
          </p>
        </section>

        <section class="metricas-notificacao">
          <div class="card-metrica">
            <i class="fa-solid fa-bell"></i>

            <div>
              <h3>Total</h3>
              <strong id="totalNotificacoes">0</strong>
            </div>
          </div>

          <div class="card-metrica">
            <i class="fa-solid fa-circle-exclamation"></i>

            <div>
              <h3>Não Lidas</h3>
              <strong id="naoLidas">0</strong>
            </div>
          </div>

          <div class="card-metrica">
            <i class="fa-solid fa-check"></i>

            <div>
              <h3>Lidas</h3>
              <strong id="lidas">0</strong>
            </div>
          </div>

          <div class="card-metrica">
            <i class="fa-solid fa-clock"></i>

            <div>
              <h3>Hoje</h3>
              <strong id="hoje">0</strong>
            </div>
          </div>
        </section>

        <div class="filtros-notificacao">
          <button id="btnTodos">Todos</button>
          <button id="btnNaoLidas">Não Lidas</button>
          <button id="btnLidas">Lidas</button>
        </div>

        <section id="listaNotificacoes"></section>
      </main>
    </div>

    <script src="notificacoes.js"></script>
    <script src="user.js"></script>
    <script src="global.js"></script>
  </body>
</html>
