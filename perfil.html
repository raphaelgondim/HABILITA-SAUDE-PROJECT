<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Perfil</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <aside class="sidebar">
        <div>
          <div class="logo-side">
            <h2>HABILITA.SAÚDE</h2>
            <p>Plataforma De Cursos em Saúde</p>
          </div>

          <ul>
            <li>
              <a href="./dashboard.html">
                <i class="fa-solid fa-house"></i>
                Início
              </a>
            </li>

            <li>
              <a href="./meus-cursos.html">
                <i class="fa-solid fa-book"></i>
                Meus Cursos
              </a>
            </li>

            <li>
              <a href="./financas.html">
                <i class="fa-solid fa-chart-pie"></i>
                Finanças
              </a>
            </li>

            <li>
              <a href="./criar-curso.html">
                <i class="fa-solid fa-plus"></i>
                Criar Curso
              </a>
            </li>

            <li>
              <a href="./usuarios.html">
                <i class="fa-solid fa-users"></i>
                Usuários
              </a>
            </li>

            <li>
              <a href="./relatorios.html">
                <i class="fa-solid fa-chart-line"></i>
                Relatórios
              </a>
            </li>
          </ul>
        </div>

        <div class="perfil">
          <div class="foto-wrapper">
            <a href="./perfil.html">
              <img id="fotoUsuarioSidebar" src="./img/perfil.jpg" />
            </a>

            <span class="online"></span>
          </div>

          <span id="nomeUsuarioSidebar"></span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1>PROFESSOR</h1>
            <p>Bem-vindo(a) ao seu painel</p>
          </div>

          <div class="icons">
            <a href="suporte.html">
              <i class="fa-regular fa-circle-question"></i>
            </a>
            <a href="notificacoes.html">
              <i class="fa-regular fa-bell"></i>
            </a>

            <div class="user-top">
              <div class="foto-wrapper">
                <a href="perfil.html">
                  <img id="fotoUsuarioTop" src="./img/perfil.jpg" />
                </a>

                <span class="online"></span>
              </div>

              <span id="nomeUsuarioTop"></span>
            </div>
          </div>
        </header>

        <section class="perfil-card">
          <h2>Meu Perfil</h2>

          <input type="text" id="nomeUsuario" />

          <input type="email" id="emailUsuario" />

          <input type="text" id="fotoUsuario" />

          <button id="salvarPerfil">Salvar Alterações</button>
        </section>
        <section id="listaNotificacoes"></section>
      </main>
    </div>

    <script src="user.js"></script>
    <script src="perfil.js"></script>
    <script src="global.js"></script>
  </body>
</html>
